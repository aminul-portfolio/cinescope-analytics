services:
  - type: web
    name: cinescope-analytics
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn Imdb.wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
      - key: DEBUG
        value: false
